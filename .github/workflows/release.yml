name: Release builds

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  targets:
    name: Prepare target matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release targets
        id: matrix
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          targets = []
          for line in Path("scripts/release-targets.txt").read_text().splitlines():
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              goos, goarch, goarm, label = line.split()
              targets.append({
                  "goos": goos,
                  "goarch": goarch,
                  "goarm": goarm,
                  "label": label,
              })

          print("matrix=" + json.dumps({"include": targets}))
          PY

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs: targets
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.targets.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archive
        env:
          VERSION: ${{ github.event.release.tag_name }}
          COMMIT: ${{ github.sha }}
          DIST_DIR: dist
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          LABEL: ${{ matrix.label }}
        run: ./scripts/build-target.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitedns-${{ github.event.release.tag_name }}-${{ matrix.label }}
          path: dist/whitedns_${{ github.event.release.tag_name }}_${{ matrix.label }}.*
          if-no-files-found: error

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - test
      - build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: whitedns-${{ github.event.release.tag_name }}-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          cd dist
          shopt -s nullglob
          artifacts=(whitedns_"$VERSION"_*.tar.gz whitedns_"$VERSION"_*.zip)
          if ((${#artifacts[@]} == 0)); then
            echo "No release artifacts found" >&2
            exit 1
          fi
          for artifact in "${artifacts[@]}"; do
            sha256sum "$artifact"
          done > "whitedns_${VERSION}_checksums.txt"

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG_NAME" dist/* --clobber
