name: Release builds

on:
  push:
    tags:
      - "v*"
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      version:
        description: "Version label or release tag for manual builds"
        required: false
        default: "dev"

permissions:
  contents: write

jobs:
  build:
    name: Test and build release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build archives
        env:
          VERSION: ${{ github.event.release.tag_name || inputs.version || github.ref_name }}
          COMMIT: ${{ github.sha }}
          DIST_DIR: dist
        run: ./scripts/build-release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: whitedns-release-assets
          path: dist/*

      - name: Upload assets to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name || inputs.version || github.ref_name }}
        run: |
          if [ "$TAG_NAME" = "dev" ] || [ -z "$TAG_NAME" ]; then
            echo "No release tag supplied; skipping GitHub Release upload."
            exit 0
          fi
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "GitHub Release $TAG_NAME does not exist yet; build artifacts are available from this workflow run."
            exit 0
          fi
          gh release upload "$TAG_NAME" dist/* --clobber
